name: NBA Daily Report

on:
  schedule:
    # Runs at 8:00 AM ET every day (13:00 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push dashboard to gh-pages

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/package.json

      - name: Install dependencies
        working-directory: src
        run: npm install

      - name: Run NBA report generator
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
        run: node generate-report.js

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          commit_message: "NBA Report - ${{ env.REPORT_DATE }}"
