<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NBA Advanced Metrics Dashboard</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#060e1a; color:#f1f5f9; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .center { text-align:center; padding:40px 20px; }
  .pulse { width:16px; height:16px; background:#22c55e; border-radius:50%; margin:0 auto 24px; box-shadow:0 0 12px #22c55e; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.3);opacity:0.7} }
</style>
</head>
<body>
<div class="center">
  <div class="pulse"></div>
  <div style="font-size:11px;color:#22c55e;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;">Awaiting First Run</div>
  <h1 style="margin:0 0 12px;font-size:28px;font-weight:900;letter-spacing:-1px;">NBA Advanced Metrics</h1>
  <p style="color:#475569;max-width:380px;margin:0 auto 24px;line-height:1.7;">
    This dashboard auto-updates every morning at 8AM ET.<br>
    Trigger a manual run in GitHub Actions to generate the first report.
  </p>
  <a href="https://github.com" style="background:#f97316;color:#fff;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;">
    Go to GitHub Actions →
  </a>
</div>
</body>
</html>
